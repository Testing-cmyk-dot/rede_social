services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: social_db
      MYSQL_USER: social_user
      MYSQL_PASSWORD: social_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data: